[env:DIY_900_RX_WeAct_Mini_H743_via_STLINK]
extends = env_common_stm32, radio_900
board = weact_mini_h743vitx
build_flags =
	${env_common_stm32.build_flags}
	${radio_900.build_flags}
	${common_env_data.build_flags_rx}
	-include target/DIY_900_RX_WeAct_Mini_H743.h
	-DTARGET_NAME=TD_FREEDOM_900RX
	-O2
board_build.ldscript = variants/H743_ldscript_no_bl.ld
build_src_filter = ${env_common_stm32.build_src_filter} -<tx_*.cpp>
lib_ignore =
	VTXSPI
	VTX
	WIFI
	TCPSOCKET
	PWM
	ServoOutput
	LR1121Driver
	SX1280Driver

[env:DIY_900_RX_WeAct_Mini_H743_via_DFU]
extends = env:DIY_900_RX_WeAct_Mini_H743_via_STLINK
upload_protocol = dfu

[env:DIY_900_RX_WeAct_Mini_H743_via_BetaflightPassthrough]
extends = env:DIY_900_RX_WeAct_Mini_H743_via_STLINK

# ********************************
# Blink test for STM32
# ********************************

[env:DIY_900_RX_WeAct_Mini_H743_Arduino_Blink_Test_via_DFU]
platform = ststm32
board = weact_mini_h743vitx
framework = arduino
upload_protocol = dfu
build_src_filter = +<../test/test_arduino_blink.cpp>

[env:DIY_900_RX_STM32H743_via_STLINK]
extends = env_common_stm32, radio_900
board = weact_mini_h743vitx
build_flags =
	${env_common_stm32.build_flags}
	${radio_900.build_flags}
	${common_env_data.build_flags_rx}
	-include target/DIY_900_RX_STM32H743.h
	-DTARGET_NAME=TD_900_RX_STM32H743
	-O2
board_build.ldscript = variants/H743_ldscript_no_bl.ld
build_src_filter = ${env_common_stm32.build_src_filter} -<tx_*.cpp>
lib_ignore =
	VTXSPI
	VTX
	WIFI
	TCPSOCKET
	PWM
	ServoOutput
	LR1121Driver
	SX1280Driver

[env:DIY_900_RX_STM32H743_via_DFU]
extends = env:DIY_900_RX_STM32H743_via_STLINK
upload_protocol = dfu
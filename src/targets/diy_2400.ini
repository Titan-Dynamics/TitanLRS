
# ********************************
# DIY SX1280 Receiver targets
# ********************************

# Common SX1280 STM32 build flags shared by release and debug envs
[sx1280_stm32_common]
extends = env_common_stm32, radio_2400
board = weact_mini_h743vitx
board_build.ldscript = variants/H743_ldscript_no_bl.ld
build_src_filter = ${env_common_stm32.build_src_filter} -<tx_*.cpp>
lib_ignore =
	VTXSPI
	VTX
	WIFI
	TCPSOCKET
	PWM
	ServoOutput
	LR1121Driver
	SX127xDriver

[env:DIY_2400_RX_STM32H743_via_STLINK]
extends = sx1280_stm32_common
build_flags =
	${env_common_stm32.build_flags}
	${radio_2400.build_flags}
	${common_env_data.build_flags_rx}
	-include target/DIY_2400_RX_STM32H743.h
	-DTARGET_NAME=TD_2400_RX_STM32H743
	-O2

[env:DIY_2400_RX_STM32H743_via_DFU]
extends = env:DIY_2400_RX_STM32H743_via_STLINK
upload_protocol = dfu

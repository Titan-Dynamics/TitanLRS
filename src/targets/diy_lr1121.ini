
# ********************************
# DIY LR1121 Receiver targets
# ********************************

# Common LR1121 STM32 build flags shared by release and debug envs
[lr1121_stm32_common]
extends = env_common_stm32, radio_LR1121
board = weact_mini_h743vitx
board_build.ldscript = variants/H743_ldscript_no_bl.ld
build_src_filter = ${env_common_stm32.build_src_filter} -<tx_*.cpp>
lib_ignore =
	VTXSPI
	VTX
	WIFI
	TCPSOCKET
	PWM
	ServoOutput
	SX127xDriver
	SX1280Driver

[env:DIY_LR1121_RX_STM32H743_via_STLINK]
extends = lr1121_stm32_common
build_flags =
	${env_common_stm32.build_flags}
	${radio_LR1121.build_flags}
	${common_env_data.build_flags_rx}
	-include target/DIY_LR1121_RX_STM32H743.h
	-DTARGET_NAME=TD_LR1121_RX
	-O2

[env:DIY_LR1121_RX_STM32H743_via_DFU]
extends = env:DIY_LR1121_RX_STM32H743_via_STLINK
upload_protocol = dfu

# Debug build with USB CDC logging
[env:DIY_LR1121_RX_STM32H743_DBG_via_STLINK]
extends = lr1121_stm32_common
build_flags =
	${env_common_stm32.build_flags}
	${radio_LR1121.build_flags}
	${common_env_data.build_flags_rx}
	-include target/DIY_LR1121_RX_STM32H743.h
	-DTARGET_NAME=TD_LR1121_RX
	-O2
	-DDEBUG_LOG
	-DUSBCON
	-DUSBD_USE_CDC
	-DHAL_PCD_MODULE_ENABLED

[env:DIY_LR1121_RX_STM32H743_DBG_via_DFU]
extends = env:DIY_LR1121_RX_STM32H743_DBG_via_STLINK
upload_protocol = dfu
